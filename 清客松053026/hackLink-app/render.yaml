services:
  - type: web
    name: hackerlink-app
    env: docker
    plan: starter
    dockerfilePath: ./清客松053026/hackLink-app/Dockerfile
    dockerContext: ./清客松053026/hackLink-app
    healthCheckPath: /api/health
    buildFilter:
      paths:
        - 清客松053026/hackLink-app/**
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hackerlink-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: hackerlink-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://hackerlink-app.onrender.com
      - key: GLM_API_KEY
        sync: false
      - key: GLM_BASE_URL
        value: https://open.bigmodel.cn/api/paas/v4
      - key: GLM_MODEL
        value: glm-4.5

  - type: redis
    name: hackerlink-redis
    plan: starter
    ipAllowList: []

databases:
  - name: hackerlink-db
    plan: starter
